<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center items-center bg-gradient-to-br from-black via-cyan-900 to-pink-800">

    <div class="flex flex-col items-center gap-6">

        <div id="card"
        class="text-center p-20 rounded-3xl shadow-2xl bg-white/20 backdrop-blur-md border border-white/30 transition-all duration-500 hover:scale-105 hover:-translate-y-2">

            <h1 class="text-5xl font-extrabold mb-6 text-white drop-shadow-lg">
                Color Changer
            </h1>

            <p id="colorName" class="text-xl text-white">
                Click The Button
            </p>

        </div>

        <button id="RandomBtn"
        class="bg-white text-purple-700 font-bold px-8 py-3 rounded-full shadow-lg transition-all duration-300 hover:scale-110 hover:-translate-y-1 hover:shadow-2xl">
            Random Color
        </button>

    </div>

    <script src="logic.js"></script>
</body>
</html>
